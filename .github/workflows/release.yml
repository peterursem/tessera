name: CMake Build and Pack

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Using 'include' lets us attach extra variables (like the file extension) to each OS
        include:
          - os: macos-latest
            ext: dmg
          - os: ubuntu-latest
            ext: tar.gz

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install Linux Dependencies
      # This step ONLY runs on Linux to install the required libraries
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xxd libglfw3-dev libgl1-mesa-dev libncurses5-dev libncursesw5-dev

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Pack
      working-directory: ${{github.workspace}}/build
      run: cpack

    - name: Save compiled binary
      uses: actions/upload-artifact@v6
      with:
        name: Tessera-${{ runner.os }}
        path: build/Tessera-v*-${{ runner.os }}.${{ matrix.ext }}