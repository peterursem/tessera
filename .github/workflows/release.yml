name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v1.1-beta, etc.

permissions:
  contents: write # Required to create a GitHub Release

jobs:
  build-and-pack:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: Tessera-macOS.dmg
            cpack_file: build/Tessera-v*-macOS.dmg
          - os: ubuntu-latest
            artifact_name: Tessera-Linux.tar.gz
            cpack_file: build/Tessera-v*-Linux.tar.gz

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xxd libglfw3-dev libgl1-mesa-dev libncurses5-dev libncursesw5-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Pack
      working-directory: build
      run: cpack -C Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.cpack_file }}

  release:
    name: Create GitHub Release
    needs: build-and-pack # Waits for both Mac and Linux to finish building
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true # Flattens the directory structure

      - name: Check if Prerelease
        id: prerelease_check
        # Automatically flags as prerelease if your tag contains -alpha, -beta, or -rc
        run: |
          if [[ "${{ github.ref }}" == *"-alpha"* ]] || [[ "${{ github.ref }}" == *"-beta"* ]] || [[ "${{ github.ref }}" == *"-rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_ENV
          else
            echo "is_prerelease=false" >> $GITHUB_ENV
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          prerelease: ${{ env.is_prerelease == 'true' }}
          generate_release_notes: true